---
appId: ${APP_ID}
---

# Instructions:
# npm run ios
# npm run maestro

# Launch app
- launchApp


# Let the app finish loading
- waitForAnimationToEnd:
      timeout: 15000

# Dismiss onboarding if it's showing
- runFlow:
      when:
          visible: Get started
      file: subflows/dismiss_onboarding.yaml

# Confirm we're on home screen
- extendedWaitUntil:
      visible:
          id: home-screen
      timeout: 20000

# Open AppInfo screen (gear icon in header)
- tapOn:
      id: app-info-button

# Wait for AppInfo to fully render
- extendedWaitUntil:
      visible:
          id: scorepad-title
      timeout: 10000

# Open dev menu if the DEVELOPER section isn't visible yet
- runFlow:
      when:
          notVisible: DEVELOPER
      file: subflows/open_dev_menu.yaml

# Scroll down to reveal the Developer section items
- swipe:
      direction: UP

# Wait for scroll animation to finish
- waitForAnimationToEnd:
      timeout: 5000

# Wait for and tap Load Sample Data
- extendedWaitUntil:
      visible:
          id: load-sample-data
      timeout: 10000
- tapOn:
      id: load-sample-data

# Confirm the destructive alert (wait for animation then tap Load)
- waitForAnimationToEnd:
      timeout: 5000
- tapOn: Load

# Wait for the home screen to be fully visible (settings screen dismissed)
- extendedWaitUntil:
      visible:
          id: home-screen
      timeout: 15000

- startRecording: 'Flow'

# Take a screenshot of the home screen with sample data
- takeScreenshot: home

# Tap the first game in the list
- tapOn:
      id: game-list-item
      index: 2

# Wait for the game screen to load
- extendedWaitUntil:
      visible:
          id: game-screen
      timeout: 15000

# Take a screenshot of the game screen
- takeScreenshot: game

# Pull up the game sheet by tapping the game title in the sheet handle
- tapOn: 'Smith Family Rummy'

# Wait for the sheet animation to complete
- waitForAnimationToEnd:
      timeout: 5000

# Take a screenshot with the game sheet visible
- takeScreenshot: game-sheet

# Tap Edit Game and Players
- tapOn:
      id: edit-game-and-players

# Wait for the settings screen to load
- extendedWaitUntil:
      visible:
          id: edit-game
      timeout: 15000

# Take a screenshot of the edit game screen
- takeScreenshot: edit-game

# Save game
- tapOn: "Save Game"

# Increase score
- swipe:
    from:
        id: "swipe-overlay-1"
    direction: UP
    waitToSettleTimeoutMs: 500

# Next round
- tapOn:
    id: "next-round-button"

# Option games menu
- tapOn:
    id: "game-options-menu"

# Show Addend Modal
- tapOn: "Point Values, Swipe: 1 / Hold: 10"

# Close Addend Modal
- tapOn:
    point: 50%,37%

# Re-open game sheet
- tapOn: 'Smith Family Rummy'

# Wait for sheet animation
- waitForAnimationToEnd:
      timeout: 5000

# Open Choose Winners modal
- tapOn:
    id: "choose-winners-button"

# Wait for modal animation
- waitForAnimationToEnd:
      timeout: 5000

# Take screenshot of winners modal
- takeScreenshot: choose-winners

# Select the top-scoring player (index 0 = highest score)
- tapOn:
    id: "winner-player-row"
    index: 0

# Confirm and lock the game
- tapOn:
    id: "lock-game-button"

# Wait for modal to dismiss
- waitForAnimationToEnd:
      timeout: 5000

- tapOn:
    id: "BackButton"

# Stop recording
- stopRecording
