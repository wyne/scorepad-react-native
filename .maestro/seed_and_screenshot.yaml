appId: com.wyne.scorepad
---
# Launch app
- launchApp

# Wait for either home screen or onboarding to appear
- extendedWaitUntil:
    anyOf:
      - visible:
          id: "home-screen"
      - visible: "Get started"
    timeout: 20000

# Dismiss onboarding if it's showing
- runFlow:
    when:
      visible: "Get started"
    file: subflows/dismiss_onboarding.yaml

# Confirm we're on home screen
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 10000

# Open AppInfo screen (gear icon in header)
- tapOn:
    label: "App Info"

# Wait for AppInfo to fully render
- extendedWaitUntil:
    visible: "FEATURES"
    timeout: 10000

# Scroll to Data section at the bottom
- repeat:
    times: 5
    commands:
      - swipe:
          direction: DOWN

# Load sample data
- tapOn: "Load Sample Data"

# Confirm the destructive alert
- extendedWaitUntil:
    visible: "This will replace all existing"
    timeout: 5000
- tapOn: "Load"

# Wait for navigation back to home screen
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 15000
- waitForAnimationToEnd:
    timeout: 5000

# Take screenshot
- takeScreenshot: "home-with-games"
