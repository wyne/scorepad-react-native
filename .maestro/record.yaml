---
appId: ${APP_ID}
---

# Launch app (sample data assumed already loaded via seed.yaml)
- launchApp

# Let the app finish loading
- waitForAnimationToEnd:
      timeout: 15000

# Confirm we're on home screen
- extendedWaitUntil:
      visible:
          id: home-screen
      timeout: 20000

- startRecording: 'Flow'

# Take a screenshot of the home screen with sample data
- takeScreenshot: home

# Tap the first game in the list
- tapOn:
      id: game-list-item
      index: 2

# Wait for the game screen to load
- extendedWaitUntil:
      visible:
          id: game-screen
      timeout: 15000

# Take a screenshot of the game screen
- takeScreenshot: game

# Pull up the game sheet by tapping the game title in the sheet handle
- tapOn: 'Smith Family Rummy'

# Wait for the sheet animation to complete
- waitForAnimationToEnd:
      timeout: 5000

# Take a screenshot with the game sheet visible
- takeScreenshot: game-sheet

# Tap Edit Game and Players
- tapOn:
      id: edit-game-and-players

# Wait for the settings screen to load
- extendedWaitUntil:
      visible:
          id: edit-game
      timeout: 15000

# Take a screenshot of the edit game screen
- takeScreenshot: edit-game

# Save game
- tapOn: "Save Game"

# Increase score
- swipe:
    from:
        id: "swipe-overlay-1"
    direction: UP
    waitToSettleTimeoutMs: 500

# Next round
- tapOn:
    id: "next-round-button"

# Option games menu
- tapOn:
    id: "game-options-menu"

# Show Addend Modal
- tapOn: "Point Values, Swipe: 1 / Hold: 10"

# Close Addend Modal
- tapOn:
    point: 50%,37%

# Re-open game sheet
- tapOn: 'Smith Family Rummy'

# Wait for sheet animation
- waitForAnimationToEnd:
      timeout: 5000

# Open Choose Winners modal
- tapOn:
    id: "choose-winners-button"

# Wait for modal animation
- waitForAnimationToEnd:
      timeout: 5000

# Take screenshot of winners modal
- takeScreenshot: choose-winners

# Select the top-scoring player (index 0 = highest score)
- tapOn:
    id: "winner-player-row"
    index: 0

# Confirm and lock the game
- tapOn:
    id: "lock-game-button"

# Wait for modal to dismiss
- waitForAnimationToEnd:
      timeout: 5000

# Dismiss the game sheet by tapping the top third of the screen
- tapOn:
    point: 50%,25%

- tapOn:
    id: "BackButton"

# Stop recording
- stopRecording
